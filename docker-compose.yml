version: '3.9'

services:
  app:
    build: .
    container_name: election-guide
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-production}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-flask-secret-change-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/bootstrap').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
